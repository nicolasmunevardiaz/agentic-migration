version: 2

models:
  - name: dq_timeliness_provider_field_metrics
    description: Provider/entity/field timeliness metrics over neutral temporal standardization rows.
    columns:
      - name: timeliness_metric_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests:
          - not_null
      - name: entity
        tests:
          - not_null
      - name: field_column
        tests:
          - not_null
      - name: total_rows
        tests:
          - not_null
      - name: timeliness_metric_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - contract_violation
                  - open_missing_temporal_value
                  - open_timezone_pending
                  - complete

  - name: dq_timeliness_contract_violations
    description: Temporal contract violations that should always remain empty before/after remediation.
    columns:
      - name: timeliness_metric_id
        tests:
          - not_null
      - name: provider_slug
        tests:
          - not_null
      - name: affected_rows
        tests:
          - not_null

  - name: dq_timeliness_findings
    description: Open timeliness findings produced by the neutral temporal metrics.
    columns:
      - name: finding_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests:
          - not_null
      - name: severity
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["critical", "high", "low"]
