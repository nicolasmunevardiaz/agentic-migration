version: 2

models:
  - name: coverage_source_normalized
    description: Row-level provider-scoped normalization of Silver coverage periods.
    columns:
      - name: coverage_source_row_id
        tests:
          - not_null
          - unique
      - name: coverage_period_id
        tests:
          - not_null
          - unique
      - name: patient_provider_member_id
        tests: [not_null]
      - name: coverage_status_id
        tests: [not_null]
      - name: provider_slug
        tests: [not_null]
      - name: source_row_id
        tests: [not_null]
      - name: source_lineage_ref
        tests: [not_null]
      - name: coverage_status
        tests:
          - accepted_values:
              arguments:
                values: ['COVERED', 'OUT_OF_COVERAGE', 'UNKNOWN']

  - name: coverage_period_fact
    description: Coverage-period fact view with date, duplicate-key, and quality flags.
    columns:
      - name: coverage_period_id
        tests:
          - not_null
          - unique
      - name: coverage_source_row_id
        tests:
          - not_null
          - unique
      - name: patient_provider_member_id
        tests: [not_null]
      - name: coverage_period_quality_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - invalid_inverted_dates
                  - review_implausible_dates
                  - review_missing_dates
                  - review_end_date_only
                  - open_ended
                  - bounded

  - name: coverage_status_dimension
    description: Canonical coverage status dimension observed in the active local batch.
    columns:
      - name: coverage_status_id
        tests:
          - not_null
          - unique
      - name: coverage_status
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: ['COVERED', 'OUT_OF_COVERAGE', 'UNKNOWN']

  - name: coverage_member_summary
    description: Provider-scoped member coverage rollup preserving multiple-row and QA flags.
    columns:
      - name: patient_provider_member_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests: [not_null]
      - name: coverage_period_row_count
        tests: [not_null]
