version: 2

models:
  - name: medication_source_normalized
    description: Row-level provider-scoped normalization of Silver medications.
    columns:
      - name: medication_source_row_id
        tests:
          - not_null
          - unique
      - name: medication_provider_id
        tests:
          - not_null
          - unique
      - name: patient_provider_member_id
        tests: [not_null]
      - name: encounter_provider_id
        tests: [not_null]
      - name: condition_provider_id
        tests: [not_null]
      - name: medication_code_id
        tests: [not_null]
      - name: medication_source_code_raw
        tests: [not_null]
      - name: provider_slug
        tests: [not_null]
      - name: source_row_id
        tests: [not_null]
      - name: source_lineage_ref
        tests: [not_null]
      - name: medication_reference
        tests: [not_null]
      - name: record_status
        tests:
          - accepted_values:
              arguments:
                values: ['active', 'inactive', 'unknown']

  - name: medication_fact
    description: Medication occurrence fact with source-code, datetime, and relationship QA flags.
    columns:
      - name: medication_source_row_id
        tests:
          - not_null
          - unique
      - name: medication_provider_id
        tests:
          - not_null
          - unique
      - name: patient_provider_member_id
        tests: [not_null]
      - name: encounter_provider_id
        tests: [not_null]
      - name: condition_provider_id
        tests: [not_null]
      - name: medication_quality_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - review_missing_source_code
                  - review_missing_description
                  - review_implausible_datetime
                  - review_missing_datetime
                  - review_orphan_member_reference
                  - review_orphan_encounter_reference
                  - review_orphan_condition_reference
                  - complete

  - name: medication_code_dimension
    description: Provider-scoped medication source-code dimension without clinical interpretation.
    columns:
      - name: medication_code_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests: [not_null]
      - name: medication_row_count
        tests: [not_null]
      - name: raw_code_variant_count
        tests: [not_null]
      - name: description_variant_count
        tests: [not_null]

  - name: medication_code_variant_dimension
    description: Provider-scoped raw medication code variants preserved under each normalized source code.
    columns:
      - name: medication_code_variant_id
        tests:
          - not_null
          - unique
      - name: medication_code_id
        tests: [not_null]
      - name: provider_slug
        tests: [not_null]
      - name: medication_source_code
        tests: [not_null]
      - name: medication_source_code_raw
        tests: [not_null]
      - name: medication_row_count
        tests: [not_null]

  - name: medication_description_variant_dimension
    description: Provider-scoped medication description variants preserved under each normalized source code.
    columns:
      - name: medication_description_variant_id
        tests:
          - not_null
          - unique
      - name: medication_code_id
        tests: [not_null]
      - name: provider_slug
        tests: [not_null]
      - name: medication_source_code
        tests: [not_null]
      - name: medication_description
        tests: [not_null]
      - name: medication_row_count
        tests: [not_null]

  - name: medication_record_status_dimension
    description: Medication record status dimension observed in active local batch.
    columns:
      - name: medication_record_status_id
        tests:
          - not_null
          - unique
      - name: record_status
        tests:
          - not_null
          - unique

  - name: medication_member_summary
    description: Provider-scoped member medication rollup with relationship and datetime QA flags.
    columns:
      - name: patient_provider_member_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests: [not_null]
      - name: medication_row_count
        tests: [not_null]
