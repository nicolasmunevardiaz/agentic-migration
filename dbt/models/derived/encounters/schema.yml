version: 2

models:
  - name: encounter_source_normalized
    description: Row-level provider-scoped normalization of Silver encounters.
    columns:
      - name: encounter_source_row_id
        tests:
          - not_null
          - unique
      - name: encounter_provider_id
        tests:
          - not_null
          - unique
      - name: patient_provider_member_id
        tests: [not_null]
      - name: provider_slug
        tests: [not_null]
      - name: source_row_id
        tests: [not_null]
      - name: source_lineage_ref
        tests: [not_null]
      - name: encounter_reference
        tests: [not_null]
      - name: coverage_status
        tests:
          - accepted_values:
              arguments:
                values: ['COVERED', 'OUT_OF_COVERAGE', 'UNINSURED', 'UNKNOWN']
      - name: record_status
        tests:
          - accepted_values:
              arguments:
                values: ['active', 'inactive', 'unknown']

  - name: encounter_fact
    description: Encounter fact view with relationship and datetime QA flags.
    columns:
      - name: encounter_source_row_id
        tests:
          - not_null
          - unique
      - name: encounter_provider_id
        tests:
          - not_null
          - unique
      - name: patient_provider_member_id
        tests: [not_null]
      - name: encounter_quality_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - review_implausible_datetime
                  - review_missing_datetime
                  - review_orphan_member_reference
                  - complete

  - name: encounter_coverage_status_dimension
    description: Encounter-context coverage status dimension observed in active local batch.
    columns:
      - name: encounter_coverage_status_id
        tests:
          - not_null
          - unique
      - name: coverage_status
        tests:
          - not_null
          - unique

  - name: encounter_record_status_dimension
    description: Encounter record status dimension observed in active local batch.
    columns:
      - name: encounter_record_status_id
        tests:
          - not_null
          - unique
      - name: record_status
        tests:
          - not_null
          - unique

  - name: encounter_member_summary
    description: Provider-scoped member encounter rollup with relationship and datetime QA flags.
    columns:
      - name: patient_provider_member_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests: [not_null]
      - name: encounter_row_count
        tests: [not_null]
