version: 2

models:
  - name: cost_record_source_normalized
    description: Row-level provider-scoped normalization of Silver medication financial cost records.
    columns:
      - name: cost_record_id
        tests:
          - not_null
          - unique
      - name: cost_source_row_id
        tests:
          - not_null
          - unique
      - name: medication_provider_id
        tests: [not_null]
      - name: patient_provider_member_id
        tests: [not_null]
      - name: encounter_provider_id
        tests: [not_null]
      - name: cost_record_status_id
        tests: [not_null]
      - name: cost_amount_source_id
        tests: [not_null]
      - name: provider_slug
        tests: [not_null]
      - name: source_row_id
        tests: [not_null]
      - name: source_lineage_ref
        tests: [not_null]
      - name: medication_reference
        tests: [not_null]
      - name: source_cost_amount_field_name
        tests:
          - accepted_values:
              arguments:
                values: ['UNIT_COST', 'RX_UNIT_AMT', 'MED_PRICE', 'LINE_PRICE', 'PAID_AMT']
      - name: record_status
        tests:
          - accepted_values:
              arguments:
                values: ['active', 'inactive', 'unknown']

  - name: cost_record_fact
    description: Medication financial source fact with amount, date, and relationship QA flags.
    columns:
      - name: cost_record_id
        tests:
          - not_null
          - unique
      - name: cost_source_row_id
        tests:
          - not_null
          - unique
      - name: medication_provider_id
        tests: [not_null]
      - name: patient_provider_member_id
        tests: [not_null]
      - name: encounter_provider_id
        tests: [not_null]
      - name: source_cost_amount_field_name
        tests: [not_null]
      - name: cost_record_quality_status
        tests:
          - accepted_values:
              arguments:
                values:
                  - review_missing_amount
                  - review_nonpositive_amount
                  - review_implausible_date
                  - review_missing_date
                  - review_orphan_member_reference
                  - review_orphan_encounter_reference
                  - review_orphan_medication_reference
                  - complete

  - name: cost_amount_source_dimension
    description: Provider-scoped source field dimension for medication financial amount provenance.
    columns:
      - name: cost_amount_source_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests: [not_null]
      - name: source_cost_amount_field_name
        tests: [not_null]
      - name: cost_record_row_count
        tests: [not_null]

  - name: cost_record_status_dimension
    description: Cost record status dimension observed in active local batch.
    columns:
      - name: cost_record_status_id
        tests:
          - not_null
          - unique
      - name: record_status
        tests:
          - not_null
          - unique

  - name: cost_record_member_summary
    description: Provider-scoped member cost-record rollup with amount/date completeness and relationship QA counts.
    columns:
      - name: patient_provider_member_id
        tests:
          - not_null
          - unique
      - name: provider_slug
        tests: [not_null]
      - name: cost_record_row_count
        tests: [not_null]
