spec_version: 0.1
artifact: model_evolution_snapshot
snapshot_id: V0_5
plan_id: 04_5_local_data_workbench_and_model_evolution_plan
status: local_table_by_table_derived_normalization_in_progress
created_at: "2026-04-30"
purpose: >
  Maintain the active table-by-table derived normalization model for data_500k-backed
  Silver entities across all approved providers. V0_5 currently includes patients,
  observation nested payloads, coverage periods, encounters, conditions, medications,
  and medication financial cost records while preserving provider-scoped lineage.
modeling_scope:
  max_layer_count: 4
  layers:
  - bronze_source_preservation
  - review_silver_and_drift_workbench
  - derived_table_by_table_normalization
  - evidence_sql_answer_outputs_unchanged
  normalized_entities_in_scope:
  - patients
  - observations
  - coverage_periods
  - encounters
  - conditions
  - medications
  - cost_records
  forbidden_until_later_plan:
  - enterprise_identity_resolution
  - clinical_interpretation
  - financial_interpretation
  - production_serving_model
  - databricks_parity_claim
  local_gold_policy: no_gold_changes_in_v0_5
  gold_design_rule: derived views are normalization outputs, not serving marts
source_contracts:
  bronze_contract: metadata/model_specs/bronze/bronze_contract.yaml
  silver_contracts:
  - metadata/model_specs/silver/members.yaml
  - metadata/model_specs/silver/observations.yaml
  - metadata/model_specs/silver/coverage_periods.yaml
  - metadata/model_specs/silver/encounters.yaml
  - metadata/model_specs/silver/conditions.yaml
  - metadata/model_specs/silver/medications.yaml
  - metadata/model_specs/silver/cost_records.yaml
  provider_to_silver_matrix: metadata/model_specs/mappings/provider_to_silver_matrix.yaml
  business_question_profiles: metadata/model_specs/impact/business_question_profiles.yaml
business_question_registry:
  version_id: BQ_V0_5
  profile_path: metadata/model_specs/impact/business_question_profiles.yaml
  profile_sha256: e9e2f2e338936c40743f3029ebd1155d14b5bd64a2851ac1c659e8357a8e3a83
  question_count: 16
  field_decision_count: 205
  completion_status: derived_table_by_table_normalization_no_bq_change
  versioning_rule: create a new BQ_V0_N entry only when the active model snapshot version advances
  acceptance_rule: V0_5 requires tested local dbt derived outputs while preserving existing tested local SQL outputs.
runtime_contracts:
  local_postgres_workbench: metadata/runtime_specs/local/local_postgres_workbench.yaml
  local_runtime_profile: metadata/runtime_specs/local/local_runtime_profile.yaml
deployment_artifacts:
  postgres_full_ddl: metadata/model_specs/evolution/V0_5/postgres_schema.sql
  deploy_handler: src/handlers/local_postgres_workbench_deploy.py
  model_evolution_handler: src/handlers/local_model_evolution_workbench.py
  deploy_runbook: docs/local_postgres_workbench_deploy.md
dbt_contract:
  project: dbt/dbt_project.yml
  profiles: dbt/profiles.yml
  model_root: dbt/models/derived
  model_roots:
  - dbt/models/derived/patients
  - dbt/models/derived/observations
  - dbt/models/derived/coverage
  - dbt/models/derived/encounters
  - dbt/models/derived/conditions
  - dbt/models/derived/medications
  - dbt/models/derived/cost_records
  target_schema: derived
  approved_adapter: dbt-postgres
  credential_policy: environment_variables_or_pgpass_only
iteration_packet_contract:
  status: complete
  packet_path: metadata/model_specs/evolution/V0_5/iteration_packet.yaml
  business_question_registry_path: metadata/model_specs/evolution/V0_5/business_question_registry.yaml
  db_state_snapshot_path: metadata/model_specs/evolution/V0_5/db_state_snapshot.yaml
  dbt_artifacts_manifest_path: metadata/model_specs/evolution/V0_5/dbt_artifacts_manifest.yaml
  lineage_summary_path: metadata/model_specs/evolution/V0_5/lineage_summary.yaml
  qa_gate_summary_path: metadata/model_specs/evolution/V0_5/qa_gate_summary.yaml
  rollback_plan_path: metadata/model_specs/evolution/V0_5/rollback_plan.yaml
ci_cd_contract:
  deploy_style: full_snapshot_redeploy
  compatibility_policy: no_backward_compatibility_required_for_plan_04_5
  change_control:
  - declarative metadata first
  - one entity at a time inside V0_5
  - dbt derived views
  - entity-specific QA tests
  - rollback to V0_3
rollback:
  strategy: redeploy_previous_complete_snapshot
  current_previous_snapshot: V0_3
  dry_run_command: UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_postgres_workbench_deploy --database agentic_migration_local --dry-run --output artifacts/local_runtime/postgres/rollback_V0_3_schema.sql
quality_gates:
  unit:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest tests/specs/test_model_specs.py tests/sql/test_patient_derived_sql_outputs.py tests/sql/test_observation_derived_sql_outputs.py tests/sql/test_coverage_derived_sql_outputs.py tests/sql/test_encounter_derived_sql_outputs.py tests/sql/test_condition_derived_sql_outputs.py tests/sql/test_medication_derived_sql_outputs.py tests/sql/test_cost_record_derived_sql_outputs.py
  integration:
  - PGHOST=/tmp PGDATABASE=agentic_migration_local UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt run --project-dir dbt --profiles-dir dbt --select path:models/derived
  - PGHOST=/tmp PGDATABASE=agentic_migration_local UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt test --project-dir dbt --profiles-dir dbt --select path:models/derived path:tests/derived
  regression:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync ruff check
  dbt:
  - PGHOST=/tmp PGDATABASE=agentic_migration_local UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt compile --project-dir dbt --profiles-dir dbt --select path:models/derived
  - PGHOST=/tmp PGDATABASE=agentic_migration_local UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt docs generate --project-dir dbt --profiles-dir dbt
normalization_iteration_rules:
  business_question_profiles_are_living_contracts: true
  field_review_scope: table-by-table normalization across approved Silver entities
  patch_policy: no_manual_database_patches
  accepted_change_unit: declarative_model_snapshot_plus_tests
  hitl_decision_table: review.hitl_decisions
  terminal_sql_requirement:
    required: false
    status: not_in_scope_until_v0_5_table_normalization_complete
guardrails:
  all_execution_local: true
  no_production_data: true
  no_databricks_jobs: true
  no_terraform: true
  no_bundle_deploy: true
  no_docker_desktop: true
  no_gold_schema_without_resolved_business_questions: true
