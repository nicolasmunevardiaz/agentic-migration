spec_version: 0.1
artifact: model_evolution_snapshot
snapshot_id: V0_2
plan_id: 04_5_local_data_workbench_and_model_evolution_plan
status: local_model_evolution_complete
created_at: "2026-04-29"
purpose: >
  Complete Plan 04.5 local PostgreSQL/dbt model evolution snapshot with fixture-backed
  Silver review loads and tested local SQL outputs for every approved business question.
modeling_scope:
  max_layer_count: 4
  layers:
  - bronze_source_preservation
  - staging_local_load_control
  - review_silver_and_drift_workbench
  - evidence_sql_answer_outputs
  forbidden_until_later_plan:
  - production_serving_model
  - databricks_parity_claim
  local_gold_policy: local_sql_outputs_only_no_production_gold
  gold_design_rule: derive local SQL outputs from resolved business questions, not provider dialects
source_contracts:
  bronze_contract: metadata/model_specs/bronze/bronze_contract.yaml
  silver_contracts:
  - metadata/model_specs/silver/conditions.yaml
  - metadata/model_specs/silver/cost_records.yaml
  - metadata/model_specs/silver/coverage_periods.yaml
  - metadata/model_specs/silver/encounters.yaml
  - metadata/model_specs/silver/medications.yaml
  - metadata/model_specs/silver/members.yaml
  - metadata/model_specs/silver/observations.yaml
  provider_to_silver_matrix: metadata/model_specs/mappings/provider_to_silver_matrix.yaml
  business_question_profiles: metadata/model_specs/impact/business_question_profiles.yaml
business_question_registry:
  version_id: BQ_V0_2
  profile_path: metadata/model_specs/impact/business_question_profiles.yaml
  profile_sha256: e9e2f2e338936c40743f3029ebd1155d14b5bd64a2851ac1c659e8357a8e3a83
  question_count: 16
  field_decision_count: 205
  completion_status: plan_04_5_complete_sql_answered
  versioning_rule: create a new BQ_V0_N entry whenever business_question_profiles.yaml changes
  acceptance_rule: Plan 04.5 completes only when every business question has tested local SQL outputs or an explicit HITL-approved deferral.
runtime_contracts:
  local_postgres_workbench: metadata/runtime_specs/local/local_postgres_workbench.yaml
  local_runtime_profile: metadata/runtime_specs/local/local_runtime_profile.yaml
deployment_artifacts:
  postgres_full_ddl: metadata/model_specs/evolution/V0_2/postgres_schema.sql
  deploy_handler: src/handlers/local_postgres_workbench_deploy.py
  model_evolution_handler: src/handlers/local_model_evolution_workbench.py
  deploy_runbook: docs/local_postgres_workbench_deploy.md
dbt_contract:
  project: dbt/dbt_project.yml
  profiles: dbt/profiles.yml
  model_root: dbt/models/business_questions
  target_schema: evidence
  approved_adapter: dbt-postgres
  credential_policy: environment_variables_or_pgpass_only
iteration_packet_contract:
  status: complete
  packet_path: metadata/model_specs/evolution/V0_2/iteration_packet.yaml
  business_question_registry_path: metadata/model_specs/evolution/V0_2/business_question_registry.yaml
  db_state_snapshot_path: metadata/model_specs/evolution/V0_2/db_state_snapshot.yaml
  dbt_artifacts_manifest_path: metadata/model_specs/evolution/V0_2/dbt_artifacts_manifest.yaml
  lineage_summary_path: metadata/model_specs/evolution/V0_2/lineage_summary.yaml
  qa_gate_summary_path: metadata/model_specs/evolution/V0_2/qa_gate_summary.yaml
  rollback_plan_path: metadata/model_specs/evolution/V0_2/rollback_plan.yaml
  sql_answer_evidence_path: metadata/model_specs/evolution/V0_2/sql_answer_evidence.yaml
ci_cd_contract:
  deploy_style: full_snapshot_redeploy
  compatibility_policy: no_backward_compatibility_required_for_plan_04_5
  change_control:
  - declarative metadata first
  - full PostgreSQL DDL snapshot
  - fixture-backed local load
  - dbt parse/compile/run/test/docs
  - SQL-answer evidence for all business questions
  - rollback to V0_1
rollback:
  strategy: redeploy_previous_complete_snapshot
  current_previous_snapshot: V0_1
  dry_run_command: UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_postgres_workbench_deploy --database agentic_migration_local --dry-run --output artifacts/local_runtime/postgres/rollback_V0_1_schema.sql
quality_gates:
  unit:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest tests/specs/test_model_specs.py
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest tests/specs/test_local_runtime_specs.py
  integration:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest tests/specs
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest tests/adapters
  regression:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync pytest
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync ruff check
  e2e_local:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_postgres_workbench_deploy --database agentic_migration_local --dry-run
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_postgres_workbench_deploy --database agentic_migration_local --apply --verify
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_model_evolution_workbench --database agentic_migration_local --load-fixtures --capture-state
  dbt:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt parse --project-dir dbt --profiles-dir dbt
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt compile --project-dir dbt --profiles-dir dbt
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt run --project-dir dbt --profiles-dir dbt
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync dbt test --project-dir dbt --profiles-dir dbt
  sql_answer:
  - UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_model_evolution_workbench --database agentic_migration_local --validate-sql-answers
normalization_iteration_rules:
  business_question_profiles_are_living_contracts: true
  field_review_scope: every field, every column, every entity, every provider
  patch_policy: no_manual_database_patches
  accepted_change_unit: declarative_model_snapshot_plus_tests
  hitl_decision_table: review.hitl_decisions
  terminal_sql_requirement:
    required: true
    status: satisfied
guardrails:
  all_execution_local: true
  no_production_data: true
  no_databricks_jobs: true
  no_terraform: true
  no_bundle_deploy: true
  no_docker_desktop: true
  no_gold_schema_without_resolved_business_questions: true
