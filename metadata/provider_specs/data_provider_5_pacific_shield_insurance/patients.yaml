spec_version: "0.1"
provider:
  provider_name: "Pacific Shield Insurance"
  provider_slug: "data_provider_5_pacific_shield_insurance"
  provider_folder: "data_provider_5_pacific_shield_insurance"
  source_type: "claims_export"
  upload_partition: "year=2025"
source:
  entity: "patients"
  filetype: "csv"
  file_extension: "csv"
  expected_file_patterns:
    - "data_500k/data_provider_5_pacific_shield_insurance/year=2025/patients/patients_*.csv"
  column_dictionary_path: "data_500k/data_provider_5_pacific_shield_insurance/year=2025/column_dictionary.md"
parser_profile:
  parser_family: "csv_claims_export"
  parser_options:
    delimiter: ","
    comment_prefix: "#"
    optional_preamble: "sep=,"
    header_mode: "optional_header_or_dictionary_order"
    duplicate_header_policy: "preserve_positions"
    expected_headers: ["CLM_SEQ", "MEMBER_ID", "MBR_FIRST_NAME", "MBR_LAST_NAME", "MBR_SSN", "MBR_SEX", "MBR_DOB", "ELIG_START_DT", "ELIG_END_DT", "MBR_STS"]
  source_row_key: "CLM_SEQ"
  canonical_row_key: "ROW_ID"
  record_grain: "one transactional membership input CSV row"
mapping:
  fields:
    - {source_header: "CLM_SEQ", source_index: 0, canonical_name: "ROW_ID", description: "Unique id per CSV row; not the business member key.", inferred_type: "string", pii_signal: false, required_for_bronze: true, required_for_silver: false, needs_human_review: false, review_reason: ""}
    - {source_header: "MEMBER_ID", source_index: 1, canonical_name: "PT_001_ID", description: "Member id present on every table; may repeat by design.", inferred_type: "string", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Member identifier and relationship behavior require review."}
    - {source_header: "MBR_FIRST_NAME", source_index: 2, canonical_name: "PT_FIRST_NM", description: "Member first name.", inferred_type: "string", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Direct identifier."}
    - {source_header: "MBR_LAST_NAME", source_index: 3, canonical_name: "PT_LAST_NM", description: "Member last name.", inferred_type: "string", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Direct identifier."}
    - {source_header: "MBR_SSN", source_index: 4, canonical_name: "SSN_VAL", description: "Government identifier or tax identifier value.", inferred_type: "string", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Highly sensitive government identifier."}
    - {source_header: "MBR_SEX", source_index: 5, canonical_name: "GDR_CD", description: "Source gender code.", inferred_type: "string", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Demographic PHI signal."}
    - {source_header: "MBR_DOB", source_index: 6, canonical_name: "BDT_VAL", description: "Birth date.", inferred_type: "date", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Date of birth is PHI."}
    - {source_header: "ELIG_START_DT", source_index: 7, canonical_name: "INIT_DT_RAW", description: "Eligibility ingress or event start date.", inferred_type: "date", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Membership date is PHI."}
    - {source_header: "ELIG_END_DT", source_index: 8, canonical_name: "END_DT_RAW", description: "Eligibility exit date when retired.", inferred_type: "date", pii_signal: true, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Membership date is PHI."}
    - {source_header: "MBR_STS", source_index: 9, canonical_name: "REC_STS", description: "Legacy membership status code.", inferred_type: "string", pii_signal: false, required_for_bronze: true, required_for_silver: false, needs_human_review: true, review_reason: "Status normalization is deferred to canonical review."}
relationships:
  primary_key_candidates: ["CLM_SEQ"]
  foreign_key_hints: []
  relationship_risks:
    - "MEMBER_ID may repeat by design and must not be treated as a unique person key without human approval."
drift:
  row_key_drift: ["Pacific Shield uses CLM_SEQ while other provider row-key headers differ."]
  filetype_drift: ["Pacific Shield uses CSV chunks with optional sep preamble, optional header rows, and dictionary-ordered data-first chunks."]
  mapping_drift: ["source_type is neutral claims_export for provider discovery and does not settle payer-vs-clinical semantics."]
  schema_drift: ["Some CSV chunks omit the header row and rely on the dictionary column order."]
quarantine_rules:
  file_level: ["stop_pipeline when CSV rows do not match the declared entity column count", "stop_pipeline when parser family is unsupported"]
  row_level: ["quarantine_data when CLM_SEQ is missing", "warn when eligibility start or end date is blank according to transaction type"]
qa_expectations:
  unit_data_tests: ["parse synthetic patient CSV fixture"]
  integration_tests: ["resolve patient CSV file patterns when local source data is present"]
  schema_tests: ["validate required provider spec sections and parser profile"]
  data_quality_tests: ["verify CLM_SEQ row-key presence"]
  reconciliation_tests: ["match dictionary headers to YAML mappings and CSV positions"]
human_review:
  required: true
  reasons: ["PII classification requires governance review", "claims_export source type requires later canonical semantic review", "MEMBER_ID repeat behavior requires relationship review before Silver semantics"]
readiness:
  adapter_ready: true
  blocked_reason: ""
