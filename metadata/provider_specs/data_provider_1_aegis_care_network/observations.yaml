spec_version: 0.1
provider:
  provider_name: "Aegis Care Network"
  provider_slug: "data_provider_1_aegis_care_network"
  provider_folder: "data_500k/data_provider_1_aegis_care_network"
  source_type: "clinical_provider"
  upload_partition: "year=2025"
source:
  entity: "observations"
  filetype: "fhir_r4"
  file_extension: "json"
  expected_file_patterns:
    - "data_500k/data_provider_1_aegis_care_network/year=2025/observations/observations_*.json"
  column_dictionary_path: "data_500k/data_provider_1_aegis_care_network/year=2025/column_dictionary.md"
parser_profile:
  parser_family: "fhir_r4_bundle"
  parser_options:
    bundle_entry_path: "entry[].resource"
    comment_prefix: "//"
    export_trailer: "###END_OF_EXPORT###"
    resource_type: "Observation"
    field_paths:
      SRC_ROW: "id"
      OBS_KEY: "identifier[0].value"
      PT_001_ID: "subject.reference"
      APPT_REF: "encounter.reference"
      OBS_DT_RAW: "effectiveDateTime"
      OBS_PAYLOAD: "valueString"
      REC_STS: "status"
  source_row_key: "SRC_ROW"
  canonical_row_key: "ROW_ID"
  record_grain: "one observation per bundle entry"
mapping:
  fields:
    - source_header: "SRC_ROW"
      canonical_name: "ROW_ID"
      description: "Unique source row identifier represented by the FHIR resource id."
      inferred_type: "string"
      pii_signal: false
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: false
      review_reason: ""
    - source_header: "OBS_KEY"
      canonical_name: "OBS_KEY"
      description: "Observation record identifier."
      inferred_type: "string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Observation identifiers are PHI-bearing linkage keys."
    - source_header: "PT_001_ID"
      canonical_name: "PT_001_ID"
      description: "Member reference for observation."
      inferred_type: "string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Patient reference is PHI-bearing and may not be globally unique."
    - source_header: "APPT_REF"
      canonical_name: "APPT_REF"
      description: "Appointment reference for observation."
      inferred_type: "string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Encounter linkage can break by design and requires reconciliation."
    - source_header: "OBS_DT_RAW"
      canonical_name: "OBS_DT_RAW"
      description: "Observation timestamp."
      inferred_type: "datetime"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: false
      review_reason: ""
    - source_header: "OBS_PAYLOAD"
      canonical_name: "OBS_PAYLOAD"
      description: "Vitals payload stored as JSON string."
      inferred_type: "json_string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Vitals are PHI and nested shape requires adapter validation before modeling."
    - source_header: "REC_STS"
      canonical_name: "REC_STS"
      description: "Legacy clinical status represented by FHIR observation status."
      inferred_type: "string"
      pii_signal: false
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Dictionary lists legacy 0/1/X/Z mix while FHIR exposes status text."
relationships:
  primary_key_candidates:
    - "SRC_ROW"
    - "OBS_KEY"
  foreign_key_hints:
    - "PT_001_ID references patients.PT_001_ID."
    - "APPT_REF references encounters.APPT_KEY."
  relationship_risks:
    - "Observation-to-encounter references require reconciliation."
drift:
  row_key_drift:
    - "Aegis uses SRC_ROW as logical row key and FHIR resource id as extraction path."
  filetype_drift:
    - "Observation files are FHIR bundle JSON."
  mapping_drift:
    - "OBS_PAYLOAD is a JSON string nested inside FHIR valueString and needs adapter parsing."
  schema_drift: []
quarantine_rules:
  file_level:
    - "stop_pipeline when bundle JSON cannot be parsed or resourceType is not Bundle."
    - "stop_pipeline when expected Observation entries are absent."
  row_level:
    - "quarantine_data when SRC_ROW, OBS_KEY, PT_001_ID, APPT_REF, or OBS_DT_RAW is missing."
    - "warn when OBS_PAYLOAD is missing or cannot be parsed as JSON string."
qa_expectations:
  unit_data_tests:
    - "Validate Observation bundle resource paths for all dictionary headers."
  integration_tests:
    - "Validate observations_*.json file pattern resolves local source files."
  schema_tests:
    - "Validate provider spec required keys and parser profile."
  data_quality_tests:
    - "Validate row key, observation key, patient reference, and encounter reference are present for sampled entries."
  reconciliation_tests:
    - "Validate all observations dictionary headers are represented in mapping.fields."
human_review:
  required: true
  reasons:
    - "Vitals payload parsing and PHI handling require HITL approval before modeling."
    - "Observation-to-encounter relationship confidence requires review."
readiness:
  adapter_ready: false
  blocked_reason: "Pending HITL approval for vitals payload handling and relationship confidence."
