spec_version: 0.1
provider:
  provider_name: "Aegis Care Network"
  provider_slug: "data_provider_1_aegis_care_network"
  provider_folder: "data_500k/data_provider_1_aegis_care_network"
  source_type: "clinical_provider"
  upload_partition: "year=2025"
source:
  entity: "encounters"
  filetype: "fhir_r4"
  file_extension: "json"
  expected_file_patterns:
    - "data_500k/data_provider_1_aegis_care_network/year=2025/encounters/encounters_*.json"
  column_dictionary_path: "data_500k/data_provider_1_aegis_care_network/year=2025/column_dictionary.md"
parser_profile:
  parser_family: "fhir_r4_bundle"
  parser_options:
    bundle_entry_path: "entry[].resource"
    comment_prefix: "//"
    export_trailer: "###END_OF_EXPORT###"
    resource_type: "Encounter"
    field_paths:
      SRC_ROW: "id"
      APPT_KEY: "identifier[0].value"
      PT_001_ID: "subject.reference"
      APPT_DT_RAW: "period.start"
      COVERAGE_STATUS: "COVERAGE_STATUS"
      REC_STS: "status"
  source_row_key: "SRC_ROW"
  canonical_row_key: "ROW_ID"
  record_grain: "one encounter visit per bundle entry"
mapping:
  fields:
    - source_header: "SRC_ROW"
      canonical_name: "ROW_ID"
      description: "Unique source row identifier represented by the FHIR resource id."
      inferred_type: "string"
      pii_signal: false
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: false
      review_reason: ""
    - source_header: "APPT_KEY"
      canonical_name: "APPT_KEY"
      description: "Unique appointment identifier within the file bundle."
      inferred_type: "string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Encounter identifiers are PHI-bearing linkage keys."
    - source_header: "PT_001_ID"
      canonical_name: "PT_001_ID"
      description: "Member reference for the encounter."
      inferred_type: "string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Patient reference is PHI-bearing and may not be globally unique."
    - source_header: "APPT_DT_RAW"
      canonical_name: "APPT_DT_RAW"
      description: "Appointment date."
      inferred_type: "datetime"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: false
      review_reason: ""
    - source_header: "COVERAGE_STATUS"
      canonical_name: "COVERAGE_STATUS"
      description: "Insurance coverage status at time of encounter."
      inferred_type: "string"
      pii_signal: true
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Coverage status may affect financial analysis and requires semantic approval."
    - source_header: "REC_STS"
      canonical_name: "REC_STS"
      description: "Legacy clinical status code represented by FHIR encounter status."
      inferred_type: "string"
      pii_signal: false
      required_for_bronze: true
      required_for_silver: false
      needs_human_review: true
      review_reason: "Dictionary lists legacy 0/1/X/Z mix while FHIR exposes status text."
relationships:
  primary_key_candidates:
    - "SRC_ROW"
    - "APPT_KEY"
  foreign_key_hints:
    - "PT_001_ID references patients.PT_001_ID."
  relationship_risks:
    - "Patient references may break by design and must be reconciled downstream."
drift:
  row_key_drift:
    - "Aegis uses SRC_ROW as logical row key and FHIR resource id as extraction path."
  filetype_drift:
    - "Encounter files are FHIR bundle JSON."
  mapping_drift:
    - "REC_STS requires normalization from FHIR status."
  schema_drift: []
quarantine_rules:
  file_level:
    - "stop_pipeline when bundle JSON cannot be parsed or resourceType is not Bundle."
    - "stop_pipeline when expected Encounter entries are absent."
  row_level:
    - "quarantine_data when SRC_ROW, APPT_KEY, PT_001_ID, or APPT_DT_RAW is missing."
    - "warn when COVERAGE_STATUS is outside expected source domain."
qa_expectations:
  unit_data_tests:
    - "Validate Encounter bundle resource paths for all dictionary headers."
  integration_tests:
    - "Validate encounters_*.json file pattern resolves local source files."
  schema_tests:
    - "Validate provider spec required keys and parser profile."
  data_quality_tests:
    - "Validate row key, appointment key, and patient reference are present for sampled entries."
  reconciliation_tests:
    - "Validate all encounters dictionary headers are represented in mapping.fields."
human_review:
  required: true
  reasons:
    - "Coverage status semantics require approval before Silver modeling."
    - "Encounter status normalization requires approval before adapter implementation."
readiness:
  adapter_ready: false
  blocked_reason: "Pending HITL approval for coverage and REC_STS semantics."
