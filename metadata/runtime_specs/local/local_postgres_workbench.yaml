spec_version: "0.1"
artifact: "local_postgres_workbench"
plan_id: "05_dbt_model_layering_and_normal_form_evolution_plan"
status: "draft_ready_for_local_deploy"
purpose: "Create an idempotent local PostgreSQL landing schema for adapter-loaded canonical provider data before dbt transformations."
database:
  engine: "postgresql"
  default_database: "agentic_migration_local"
  credential_policy: "use_local_psql_environment_or_pgpass_only"
  forbidden:
    - "production_data"
    - "cloud_credentials"
    - "databricks_execution"
    - "terraform"
    - "bundle_deploy"
    - "docker_desktop"
schemas:
  - name: "landing"
    purpose: "Adapter-loaded canonical landing tables for all approved providers before dbt transformations."
landing_tables:
  enabled: true
  schema: "landing"
  table_prefix: ""
  source_spec_root: "metadata/model_specs/silver"
  include_all_contract_columns: true
  generated_table_names:
    - "landing.conditions"
    - "landing.cost_records"
    - "landing.coverage_periods"
    - "landing.encounters"
    - "landing.medications"
    - "landing.members"
    - "landing.observations"
  additional_columns:
    - name: "review_batch_id"
      type: "text"
      nullable: true
    - name: "loaded_at"
      type: "timestamptz"
      nullable: false
      default: "now()"
manual_tables: []
deploy:
  sql_artifact: "artifacts/local_runtime/postgres/local_workbench_schema.sql"
  default_command: "UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_postgres_workbench_deploy --database agentic_migration_local --apply --verify"
  dry_run_command: "UV_CACHE_DIR=/private/tmp/uv-cache uv run --no-sync python -m src.handlers.local_postgres_workbench_deploy --database agentic_migration_local --dry-run"
  idempotency:
    - "CREATE SCHEMA IF NOT EXISTS"
    - "CREATE TABLE IF NOT EXISTS"
    - "ALTER TABLE ADD COLUMN IF NOT EXISTS"
    - "CREATE INDEX IF NOT EXISTS"
guardrails:
  - "No DROP, TRUNCATE, DELETE, or destructive DDL in deploy."
  - "No operational, evidence, review, scratch, data_quality, or modeled schemas in pre-dbt provision."
  - "No production data."
  - "No cloud credentials."
  - "No Databricks, Terraform, bundle, Docker Desktop, or Snowflake execution."
  - "Generated SQL must be reviewable before apply."
