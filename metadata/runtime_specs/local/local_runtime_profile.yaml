spec_version: "0.1"
profile_name: "local_dev"
status: "contract_defined_not_executed"
purpose: "Fast cloud-agnostic certification of adapter and contract behavior before Databricks rollout."
runtime_scope:
  validates:
    - "provider_parser_output"
    - "bronze_contract_shape"
    - "canonical_mapping_contract"
    - "silver_contract_shape"
    - "quarantine_contract_shape"
    - "qa_evidence_shape"
    - "lineage_evidence_shape"
  does_not_validate:
    - "unity_catalog_permissions"
    - "databricks_runtime_optimizations"
    - "lakeflow_managed_orchestration"
    - "lakeflow_auto_cdc"
    - "serverless_behavior"
    - "cloud_iam"
    - "production_performance"
    - "databricks_event_logs"
allowed_paths:
  runtime_outputs: "artifacts/local_runtime/"
  qa_evidence: "reports/qa/local_runtime_certification.md"
  privacy_review: "reports/privacy/local_runtime_dependency_review.md"
  trace_log: "logs/local_runtime/local_runtime_certification.md"
blocked_in_local_dev:
  - "databricks_workspace_paths"
  - "databricks_tokens"
  - "unity_catalog_targets"
  - "terraform_apply"
  - "bundle_deploy"
  - "cloud_resource_creation"
  - "production_data"
candidate_dependencies:
  - name: "pyspark[pipelines]"
    purpose: "Optional Spark Declarative Pipelines local run and dry-run capability."
    approval_status: "pending_human_approval"
    blocked_action: "Do not install or run Spark pipelines."
  - name: "delta-spark"
    purpose: "Optional Delta Lake OSS table behavior for local Bronze/Silver tests."
    approval_status: "pending_human_approval"
    blocked_action: "Do not install or write Delta tables."
  - name: "openlineage-spark"
    purpose: "Optional Spark listener for local lineage event capture."
    approval_status: "pending_human_approval"
    blocked_action: "Do not install or emit OpenLineage events."
  - name: "marquez"
    purpose: "Optional local lineage backend/UI when Docker is approved."
    approval_status: "pending_human_approval"
    blocked_action: "Do not start Docker services."
evidence_status:
  local_validation_state: "local_validated"
  databricks_validation_state: "not_databricks_certified"
  dependency_installation_state: "not_installed"
